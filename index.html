<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="nourish"/>
<title>nourish</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:#0f0e0c; --bg2:#1a1814; --bg3:#1e1c18; --border:#2a2820;
    --text:#e8e2d9; --muted:#6a6258; --dim:#4a4540;
    --gold:#c8954a; --green:#6abf8a; --red:#c05a3a; --sage:#8aab8a;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;background:var(--bg);color:var(--text)}
  input,textarea{outline:none;-webkit-appearance:none}
  button{cursor:pointer;border:none;background:none}
  ::-webkit-scrollbar{width:3px}
  ::-webkit-scrollbar-thumb{background:#333}
  ::placeholder{color:var(--dim)}

  .app{display:flex;flex-direction:column;height:100vh;height:-webkit-fill-available}
  .header{padding:52px 20px 0;border-bottom:1px solid var(--bg3);flex-shrink:0}
  .header-top{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:20px}
  .wordmark{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;letter-spacing:.04em}
  .wordmark-sub{font-family:'DM Mono',monospace;font-size:9px;color:var(--dim);letter-spacing:.14em;text-transform:uppercase;margin-top:2px}
  .streak{text-align:right}
  .streak-num{font-family:'DM Mono',monospace;font-size:20px;color:var(--green)}
  .streak-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--dim);letter-spacing:.1em}
  .nav{display:flex}
  .nav-btn{background:none;border:none;border-bottom:2px solid transparent;color:var(--dim);padding:8px 16px 10px;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;transition:all .15s}
  .nav-btn.active{border-bottom-color:var(--text);color:var(--text)}
  .content{flex:1;overflow-y:auto;padding:24px 20px 100px;max-width:480px;width:100%;margin:0 auto}

  .sync-bar{font-family:'DM Mono',monospace;font-size:9px;color:var(--dim);letter-spacing:.08em;margin-bottom:20px;display:flex;align-items:center;gap:6px}
  .sync-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;background:var(--dim)}
  .sync-dot.synced{background:var(--green)}
  .sync-dot.syncing{background:var(--gold);animation:pulse 1s infinite}
  .sync-dot.error{background:var(--red)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

  /* Occasion pills */
  .occasion-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px}
  .occ-pill{padding:7px 14px;border-radius:20px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.06em;border:1px solid var(--bg3);color:var(--dim);background:transparent;transition:all .15s}
  .occ-pill.selected{border-color:var(--text);color:var(--text);background:var(--bg2)}

  /* Kind toggle */
  .kind-row{display:flex;gap:8px;margin-bottom:18px}
  .kind-btn{flex:1;padding:12px;border-radius:6px;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;border:1px solid var(--bg3);color:var(--dim);background:transparent;transition:all .15s}
  .kind-btn.win{border-color:var(--sage);color:var(--sage);background:#0a1a0a}
  .kind-btn.dev{border-color:var(--gold);color:var(--gold);background:#1a100a}

  /* Type buttons */
  .type-btn{display:flex;align-items:center;width:100%;background:transparent;border:1px solid var(--bg3);border-radius:6px;padding:10px 14px;margin-bottom:7px;color:var(--text);text-align:left;transition:all .15s;gap:12px}
  .type-btn.sel-win{background:var(--bg2);border-color:var(--sage)}
  .type-btn.sel-dev{background:var(--bg2);border-color:var(--gold)}
  .type-icon{font-family:'DM Mono',monospace;font-size:14px;color:var(--dim);width:16px;flex-shrink:0}
  .type-btn.sel-win .type-icon{color:var(--sage)}
  .type-btn.sel-dev .type-icon{color:var(--gold)}
  .type-label{font-family:'Cormorant Garamond',serif;font-size:15px}
  .type-note{font-family:'DM Mono',monospace;font-size:9px;color:var(--dim);margin-top:1px;letter-spacing:.05em}

  .textarea{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:12px 14px;color:var(--text);font-family:'Cormorant Garamond',serif;font-size:15px;resize:none;margin-bottom:14px}
  .input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:8px 10px;color:var(--text);font-family:'Cormorant Garamond',serif;font-size:18px}
  .sl{font-family:'DM Mono',monospace;font-size:9px;color:var(--dim);letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px}

  .btn{width:100%;padding:14px;border-radius:6px;font-family:'DM Mono',monospace;font-size:12px;letter-spacing:.1em;text-transform:uppercase;transition:all .2s;border:none}
  .btn-sage{background:var(--sage);color:var(--bg)}
  .btn-gold{background:var(--gold);color:var(--bg)}
  .btn-light{background:var(--text);color:var(--bg)}
  .btn-saved{background:#2a4a35;color:var(--green)}

  .card{background:var(--bg2);border:1px solid var(--bg3);border-radius:10px;padding:18px;margin-bottom:16px}
  .divider{border:none;border-top:1px solid var(--bg3);margin:20px 0}

  .entry-row{display:flex;gap:10px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--bg2)}
  .entry-icon{font-family:'DM Mono',monospace;font-size:12px;margin-top:1px;flex-shrink:0}
  .entry-main{font-family:'Cormorant Garamond',serif;font-size:14px}
  .entry-sub{font-family:'Cormorant Garamond',serif;font-size:12px;color:var(--dim);font-style:italic;margin-top:2px}
  .entry-occ{font-family:'DM Mono',monospace;font-size:9px;color:var(--dim);margin-top:2px;letter-spacing:.05em}
  .entry-time{text-align:right;flex-shrink:0;font-family:'DM Mono',monospace;font-size:9px;color:var(--dim)}
  .delete-btn{color:var(--dim);font-size:16px;padding:0 0 0 8px;line-height:1;flex-shrink:0}

  /* 80/20 bar */
  .score-bar-wrap{background:var(--bg3);border-radius:4px;height:6px;width:100%;margin:8px 0 4px;overflow:hidden}
  .score-bar-fill{height:100%;border-radius:4px;transition:width .4s ease}

  .phase-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
  .phase-pill{padding:6px 14px;border-radius:20px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.08em;border:1px solid var(--bg3);color:var(--dim);background:transparent;transition:all .15s}
  .phase-pill.selected{border-color:var(--gold);color:var(--gold);background:#1f150a}

  .meas-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
  .meas-field label{font-family:'DM Mono',monospace;font-size:9px;color:var(--dim);letter-spacing:.1em;text-transform:uppercase;display:block;margin-bottom:6px}
  .meas-val{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300}
  .meas-unit{font-family:'DM Mono',monospace;font-size:10px;color:var(--dim);margin-left:2px}
  .delta{font-size:10px;padding:2px 6px;border-radius:10px;margin-left:6px;font-family:'DM Mono',monospace}
  .delta-down{background:#1a3a28;color:var(--green)}
  .delta-up{background:#3a1a14;color:var(--red)}

  .week-block{margin-bottom:28px}
  .week-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}
  .week-lbl{font-family:'Cormorant Garamond',serif;font-size:16px}
  .tag-row{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
  .tag{background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:4px 8px;display:flex;align-items:center;gap:5px}
  .tag-icon{font-family:'DM Mono',monospace;font-size:10px}
  .tag-ct{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted)}
  .tag-nm{font-family:'Cormorant Garamond',serif;font-size:11px;color:var(--muted)}

  .empty{text-align:center;color:var(--dim);font-family:'Cormorant Garamond',serif;font-size:15px;font-style:italic;margin-top:60px}
  .empty small{font-size:12px;font-family:'DM Mono',monospace;display:block;margin-top:6px}
  @keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
  .fade-in{animation:fadeIn .2s ease}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-top">
      <div>
        <div class="wordmark">nourish</div>
        <div class="wordmark-sub">wins · results</div>
      </div>
      <div class="streak" id="streakBadge" style="display:none">
        <div class="streak-num" id="streakNum">0</div>
        <div class="streak-label">day streak</div>
      </div>
    </div>
    <div class="nav">
      <button class="nav-btn active" onclick="setView('log')">Log</button>
      <button class="nav-btn" onclick="setView('results')">Results</button>
      <button class="nav-btn" onclick="setView('history')">History</button>
    </div>
  </div>
  <div class="content" id="content"></div>
</div>
<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzM_01L6MbDmBL6DjG2hyeGWUoVOfe3V4XFvoojHyrTVbxrDGJaTVnEN_wMEtjjbvhy/exec";

const OCCASIONS = ["Breakfast","Morning Snack","Lunch","Afternoon Snack","Dinner","Late Night Snack"];

const WIN_TYPES = [
  {id:"ate_hungry",   label:"Ate when hungry",           icon:"◎", note:"started at 3–4 on the scale"},
  {id:"stopped_well", label:"Stopped when satisfied",    icon:"◉", note:"stopped at 6–7, not full"},
  {id:"paused",       label:"Paused before eating",      icon:"○", note:"checked in before acting on hunger"},
  {id:"stayed_norm",  label:"Stayed within usual foods", icon:"◇", note:"ate from my baseline"},
  {id:"felt_good",    label:"Felt good after eating",    icon:"◈", note:"energy, no regret, satisfied"},
];
const DEV_TYPES = [
  {id:"not_hungry",   label:"Ate when not hungry",     icon:"○", note:"stress, emotional, social"},
  {id:"past_full",    label:"Ate past full",            icon:"◉", note:"went beyond satisfied"},
  {id:"outside_norm", label:"Ate outside usual foods",  icon:"◇", note:"different from routine"},
  {id:"late_night",   label:"Late night eating",        icon:"◐", note:"after dinner"},
];
const PHASES = ["Follicular","Ovulatory","Luteal","Menstrual"];
const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

let state = {
  view:"log",
  log:[], wins:[], devs:[], measurements:[],
  form:{ occasion:null, kind:null, types:[], note:"" },
  measForm:{ waist:"", hips:"", bust:"", weight:"", phase:"" },
  syncStatus:"idle", saved:false, measSaved:false,
};

// ── Date helpers ──────────────────────────────────────────
function todayStr() {
  const d=new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
function weekKey(ds) {
  if (!ds||ds==="") return "";
  const d=new Date(ds+"T00:00:00"), s=new Date(d);
  s.setDate(d.getDate()-d.getDay());
  return `${s.getFullYear()}-${String(s.getMonth()+1).padStart(2,"0")}-${String(s.getDate()).padStart(2,"0")}`;
}
function getWeekLabel(wk) {
  if (!wk||wk==="") return "—";
  const s=new Date(wk+"T00:00:00"), e=new Date(s);
  e.setDate(s.getDate()+6);
  return `${MONTHS[s.getMonth()]} ${s.getDate()} – ${MONTHS[e.getMonth()]} ${e.getDate()}`;
}
function formatTime() { return new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}); }

// ── 80/20 calc ───────────────────────────────────────────
function calc8020(weekEntries) {
  // Count unique occasions per day, tagged as win or dev
  // An occasion is a win if kind==="win", dev if kind==="dev"
  // Legacy wins (from old Wins tab) count as wins; legacy devs count as devs
  const total = weekEntries.length;
  if (!total) return null;
  const wins = weekEntries.filter(e => (e.kind||"win")==="win").length;
  return { wins, total, pct: Math.round((wins/total)*100) };
}

// ── Streak ────────────────────────────────────────────────
function calcStreak() {
  const allDays = [...state.log, ...state.wins].map(e=>e.date).filter(Boolean);
  const days = [...new Set(allDays)].sort((a,b)=>b.localeCompare(a));
  if (!days.length) return 0;
  let streak=0, check=new Date();
  for (const day of days) {
    const d=new Date(day+"T00:00:00");
    if (Math.round((check-d)/86400000)<=1) { streak++; check=d; } else break;
  }
  return streak;
}

// ── Sync ─────────────────────────────────────────────────
function setSyncStatus(s) { state.syncStatus=s; render(); }
async function loadData() {
  if (!SCRIPT_URL||SCRIPT_URL.indexOf("YOUR_APPS_SCRIPT")!==-1) return;
  setSyncStatus("syncing");
  try {
    const res=await fetch(`${SCRIPT_URL}?action=getAll`);
    const data=await res.json();
    state.log=data.log||[];
    state.wins=data.wins||[];
    state.devs=data.devs||[];
    state.measurements=data.measurements||[];
    setSyncStatus("synced");
  } catch(e) { setSyncStatus("error"); }
}
async function postData(body) {
  if (!SCRIPT_URL||SCRIPT_URL.indexOf("YOUR_APPS_SCRIPT")!==-1) return;
  setSyncStatus("syncing");
  try { await fetch(SCRIPT_URL,{method:"POST",body:JSON.stringify(body)}); setSyncStatus("synced"); }
  catch(e) { setSyncStatus("error"); }
}

// ── Actions ───────────────────────────────────────────────
async function logEntry() {
  const f=state.form;
  if (!f.occasion||!f.kind||!f.types.length) return;
  const entry={
    id:Date.now(), date:todayStr(), time:formatTime(),
    weekKey:weekKey(todayStr()),
    occasion:f.occasion, kind:f.kind,
    types:f.types.join(","), note:f.note,
  };
  state.log=[entry,...state.log];
  state.form={occasion:null,kind:null,types:[],note:""};
  state.saved=true; render();
  await postData({action:"logEntry",entry});
  setTimeout(()=>{state.saved=false;render();},2000);
}

async function saveMeasurement() {
  const f=state.measForm;
  if (!f.waist&&!f.hips&&!f.bust&&!f.weight) return;
  const today=todayStr();
  const entry={id:Date.now(),date:today,weekKey:weekKey(today),...f};
  state.measurements=[entry,...state.measurements.filter(m=>m.date!==today)];
  state.measSaved=true; render();
  await postData({action:"saveMeasurement",entry});
  setTimeout(()=>{state.measSaved=false;render();},2000);
}

async function deleteEntry(id) {
  state.log=state.log.filter(e=>String(e.id)!==String(id));
  render();
  await postData({action:"deleteEntry",id});
}

// ── Render helpers ────────────────────────────────────────
function syncBar() {
  if (!SCRIPT_URL||SCRIPT_URL.indexOf("YOUR_APPS_SCRIPT")!==-1) return "";
  const labels={idle:"ready",syncing:"syncing…",synced:"synced with sheets",error:"sync error"};
  return `<div class="sync-bar"><div class="sync-dot ${state.syncStatus}"></div>${labels[state.syncStatus]||""}</div>`;
}
function delta(field) {
  const m=state.measurements;
  if (m.length<2||!m[0][field]||!m[1][field]) return null;
  return parseFloat(m[0][field])-parseFloat(m[1][field]);
}
function deltaBadge(field,unit) {
  const d=delta(field); if (d===null) return "";
  const cls=d<0?"delta-down":d>0?"delta-up":"";
  return `<span class="delta ${cls}">${d>0?"+":""}${d.toFixed(1)}${unit}</span>`;
}

function score8020Html(score) {
  if (!score) return "";
  const color=score.pct>=80?"var(--green)":score.pct>=60?"var(--gold)":"var(--red)";
  return `
    <div style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;align-items:baseline">
        <span style="font-family:'DM Mono',monospace;font-size:9px;color:var(--dim);letter-spacing:.1em">80/20 SCORE</span>
        <span style="font-family:'Cormorant Garamond',serif;font-size:20px;color:${color}">${score.pct}%</span>
      </div>
      <div class="score-bar-wrap"><div class="score-bar-fill" style="width:${score.pct}%;background:${color}"></div></div>
      <div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--dim)">${score.wins} of ${score.total} occasions on track</div>
    </div>`;
}

// ── Log view ─────────────────────────────────────────────
function renderLog() {
  const todayEntries=state.log.filter(e=>e.date===todayStr());
  const f=state.form;

  // Step 1: occasion
  const occPills=OCCASIONS.map(o=>`
    <button class="occ-pill ${f.occasion===o?"selected":""}" onclick="setOcc('${o}')">${o}</button>
  `).join("");

  // Step 2: win or deviation
  const kindSection=f.occasion?`
    <div class="fade-in">
      <div class="sl" style="margin-bottom:10px">How was this occasion?</div>
      <div class="kind-row">
        <button class="kind-btn ${f.kind==="win"?"win":""}" onclick="setKind('win')">✓ Win</button>
        <button class="kind-btn ${f.kind==="dev"?"dev":""}" onclick="setKind('dev')">△ Deviation</button>
      </div>
    </div>` : "";

  // Step 3: type selection
  const types = f.kind==="win" ? WIN_TYPES : f.kind==="dev" ? DEV_TYPES : [];
  const typeButtons=f.kind?`
    <div class="fade-in">
      <div class="sl" style="margin-bottom:10px">${f.kind==="win"?"What went well?":"What happened?"}</div>
      ${types.map(t=>{
        const sel=f.types.includes(t.id);
        const selClass=sel?(f.kind==="win"?"sel-win":"sel-dev"):"";
        return `<button class="type-btn ${selClass}" onclick="toggleType('${t.id}')">
          <span class="type-icon">${t.icon}</span>
          <div><div class="type-label">${t.label}</div><div class="type-note">${t.note}</div></div>
          ${sel?`<span style="margin-left:auto;color:${f.kind==="win"?"var(--sage)":"var(--gold)"};font-family:DM Mono,monospace;font-size:10px">✓</span>`:""}
        </button>`;
      }).join("")}
    </div>` : "";

  // Step 4: note + save
  const saveSection=f.kind&&f.types.length?`
    <div class="fade-in">
      <textarea class="textarea" rows="2" placeholder="Any reflection? (optional)" oninput="state.form.note=this.value">${f.note}</textarea>
      <button class="btn ${state.saved?"btn-saved":f.kind==="win"?"btn-sage":"btn-gold"}" onclick="logEntry()">
        ${state.saved?"logged ✓":"log "+f.occasion}
      </button>
    </div>` : "";

  // Today's score
  const todayScore=calc8020(todayEntries);
  const todayScoreHtml=todayScore?`
    <hr class="divider"/>
    ${score8020Html(todayScore)}` : "";

  // Today's log
  const todayList=todayEntries.length?`
    ${!todayScore?'<hr class="divider"/>':''}
    <div class="sl" style="margin-bottom:12px">Today</div>
    ${todayEntries.map(e=>{
      const isWin=(e.kind||"win")==="win";
      const typeIds=(e.types||"").split(",");
      const allTypes=isWin?WIN_TYPES:DEV_TYPES;
      const matched=typeIds.map(id=>allTypes.find(t=>t.id===id)).filter(Boolean);
      return `<div class="entry-row">
        <span class="entry-icon" style="color:${isWin?"var(--sage)":"var(--gold)"}">${matched[0]?.icon||"·"}</span>
        <div style="flex:1">
          <div class="entry-main" style="color:${isWin?"var(--text)":"var(--muted)"}">${matched.map(t=>t.label).join(" · ")||e.types}</div>
          <div class="entry-occ">${e.occasion||""}</div>
          ${e.note?`<div class="entry-sub">${e.note}</div>`:""}
        </div>
        <div class="entry-time">${e.time}</div>
        <button class="delete-btn" onclick="deleteEntry(${e.id})">×</button>
      </div>`;
    }).join("")}` : "";

  return `${syncBar()}
    <div style="font-family:'Cormorant Garamond',serif;font-size:13px;color:var(--dim);margin-bottom:16px;font-style:italic">Which occasion are you logging?</div>
    <div class="occasion-row">${occPills}</div>
    ${kindSection}${typeButtons}${saveSection}
    ${todayScoreHtml}${todayList}`;
}

// ── Results view ──────────────────────────────────────────
function renderResults() {
  const latest=state.measurements[0];
  const fields=[["waist","Waist","in"],["hips","Hips","in"],["bust","Bust","in"],["weight","Weight","lb"]];
  const f=state.measForm;

  const latestCard=latest?`<div class="card">
    <div class="sl">Latest · ${latest.date}${latest.phase?` · <span style="color:var(--gold);text-transform:none;letter-spacing:0">${latest.phase}</span>`:""}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:10px">
      ${fields.map(([field,label,unit])=>latest[field]?`
        <div><div class="sl">${label}</div>
          <span class="meas-val">${latest[field]}</span><span class="meas-unit">${unit}</span>${deltaBadge(field,unit)}
        </div>`:"").join("")}
    </div>
  </div>`:"";

  const phaseButtons=PHASES.map(p=>`<button class="phase-pill ${f.phase===p?"selected":""}" onclick="setPhase('${p}')">${p}</button>`).join("");

  const logCard=`<div class="card">
    <div style="font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:300;margin-bottom:16px">Log measurements</div>
    <div class="sl">Cycle phase</div>
    <div class="phase-row">${phaseButtons}</div>
    <div class="meas-grid">
      ${fields.map(([field,label,unit])=>`
        <div class="meas-field"><label>${label} (${unit})${field==="weight"?" · monthly":""}</label>
          <input class="input" type="number" step="0.1" placeholder="—" value="${f[field]}" oninput="state.measForm['${field}']=this.value"/>
        </div>`).join("")}
    </div>
    <button class="btn ${state.measSaved?"btn-saved":"btn-light"}" onclick="saveMeasurement()">${state.measSaved?"saved ✓":"save measurements"}</button>
  </div>`;

  const history=state.measurements.length>1?`
    <div class="sl" style="margin-top:4px">History</div>
    ${state.measurements.slice(0,10).map((m,i)=>`
      <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--bg2)">
        <div>
          <div style="font-family:'DM Mono',monospace;font-size:10px;color:${i===0?"var(--text)":"var(--dim)"}">${m.date}</div>
          ${m.phase?`<div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--gold);margin-top:2px">${m.phase}</div>`:""}
        </div>
        <div style="display:flex;gap:14px">
          ${fields.map(([field])=>m[field]?`
            <div style="text-align:right">
              <div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--dim)">${field[0].toUpperCase()}</div>
              <div style="font-family:'Cormorant Garamond',serif;font-size:15px;color:${i===0?"var(--text)":"var(--muted)"}">${m[field]}</div>
            </div>`:"").join("")}
        </div>
      </div>`).join("")}`:"";

  return `${syncBar()}${latestCard}${logCard}${history}`;
}

// ── History view ──────────────────────────────────────────
function renderHistory() {
  // Merge new log + legacy wins/devs
  const allEntries=[
    ...state.log.map(e=>({...e,kind:e.kind||"win"})),
    ...state.wins.map(e=>({...e,kind:"win",types:e.types||""})),
    ...state.devs.map(e=>({...e,kind:"dev",types:e.type||""})),
  ];

  const byWeek=allEntries.reduce((acc,e)=>{
    const wk=e.weekKey||weekKey(e.date||"");
    if (!wk) return acc;
    if (!acc[wk]) acc[wk]=[];
    acc[wk].push(e); return acc;
  },{});

  const wks=Object.keys(byWeek).sort((a,b)=>b.localeCompare(a));
  if (!wks.length) return `${syncBar()}<div class="empty">No entries yet.<small>Start logging today.</small></div>`;
  const thisWk=weekKey(todayStr());

  return syncBar()+wks.map(wk=>{
    const entries=byWeek[wk].sort((a,b)=>(b.date||"").localeCompare(a.date||"")||(b.time||"").localeCompare(a.time||""));
    const isThis=wk===thisWk;
    const score=calc8020(entries);
    const wkMeas=state.measurements.find(m=>m.weekKey===wk);

    // Type frequency tags
    const winCounts={}, devCounts={};
    entries.filter(e=>e.kind==="win").forEach(e=>(e.types||"").split(",").forEach(t=>{if(t)winCounts[t]=(winCounts[t]||0)+1;}));
    entries.filter(e=>e.kind==="dev").forEach(e=>{const t=e.types||e.type||"";if(t)devCounts[t]=(devCounts[t]||0)+1;});
    const winTags=Object.entries(winCounts).map(([id,ct])=>{const t=WIN_TYPES.find(t=>t.id===id);return t?`<div class="tag"><span class="tag-icon" style="color:var(--sage)">${t.icon}</span><span class="tag-ct">${ct}×</span><span class="tag-nm">${t.label.split(" ").slice(0,2).join(" ")}</span></div>`:""}).join("");
    const devTags=Object.entries(devCounts).map(([id,ct])=>{const t=DEV_TYPES.find(t=>t.id===id);return t?`<div class="tag"><span class="tag-icon" style="color:var(--gold)">${t.icon}</span><span class="tag-ct">${ct}×</span><span class="tag-nm">${t.label.split(" ").slice(0,2).join(" ")}</span></div>`:""}).join("");

    const measLine=wkMeas?`<div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--dim);margin-bottom:8px;letter-spacing:.06em">
      ${wkMeas.phase?`<span style="color:var(--gold)">${wkMeas.phase}</span> · `:""}${[["waist","W"],["hips","H"],["bust","B"],["weight","Wt"]].filter(([f])=>wkMeas[f]).map(([f,l])=>`${l} ${wkMeas[f]}`).join("  ")}
    </div>`:"";

    return `<div class="week-block">
      <div class="week-header">
        <div class="week-lbl" style="color:${isThis?"var(--text)":"var(--muted)"}">${getWeekLabel(wk)}</div>
      </div>
      ${score?score8020Html(score):""}
      ${measLine}
      ${winTags||devTags?`<div class="tag-row">${winTags}${devTags}</div>`:""}
      ${entries.map(e=>{
        const isWin=e.kind==="win";
        const typeIds=(e.types||e.type||"").split(",");
        const allT=isWin?WIN_TYPES:DEV_TYPES;
        const matched=typeIds.map(id=>allT.find(t=>t.id===id)).filter(Boolean);
        return `<div class="entry-row">
          <span class="entry-icon" style="color:${isWin?"var(--sage)":"var(--gold)"}">${matched[0]?.icon||"·"}</span>
          <div style="flex:1">
            <span class="entry-main" style="color:${isWin?"var(--text)":"var(--muted)"}">${matched.map(t=>t.label).join(" · ")||typeIds[0]||""}</span>
            ${e.occasion?`<div class="entry-occ">${e.occasion}</div>`:""}
            ${e.note?`<div class="entry-sub">${e.note}</div>`:""}
          </div>
          <div class="entry-time">${e.date||""}<br/>${e.time||""}</div>
        </div>`;
      }).join("")}
    </div>`;
  }).join("");
}

// ── Main render ───────────────────────────────────────────
function render() {
  const streak=calcStreak();
  const badge=document.getElementById("streakBadge"),num=document.getElementById("streakNum");
  if (badge&&num){badge.style.display=streak>0?"block":"none";num.textContent=streak;}
  document.querySelectorAll(".nav-btn").forEach((b,i)=>b.classList.toggle("active",["log","results","history"][i]===state.view));
  const c=document.getElementById("content");
  if (c) c.innerHTML=state.view==="log"?renderLog():state.view==="results"?renderResults():renderHistory();
}

// ── Handlers ─────────────────────────────────────────────
function setView(v){state.view=v;render();}
function setOcc(o){state.form.occasion=state.form.occasion===o?null:o;state.form.kind=null;state.form.types=[];render();}
function setKind(k){state.form.kind=state.form.kind===k?null:k;state.form.types=[];render();}
function toggleType(id){const i=state.form.types.indexOf(id);if(i>-1)state.form.types.splice(i,1);else state.form.types.push(id);render();}
function setPhase(p){state.measForm.phase=state.measForm.phase===p?"":p;render();}

try { render(); } catch(err) {
  document.getElementById("content").innerHTML=
    `<div style="font-family:monospace;font-size:12px;color:#c05a3a;padding:20px"><b>JS Error:</b><br>${err.message}<br><br>${(err.stack||"").replace(/\n/g,"<br>")}</div>`;
}
loadData();
</script>
</body>
</html>
