<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="nourish"/>
<title>nourish</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0f0e0c;
    --bg2: #1a1814;
    --bg3: #1e1c18;
    --border: #2a2820;
    --text: #e8e2d9;
    --muted: #6a6258;
    --dim: #4a4540;
    --gold: #c8954a;
    --green: #6abf8a;
    --red: #c05a3a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Lora', serif; }
  input, textarea { outline: none; -webkit-appearance: none; }
  button { cursor: pointer; border: none; background: none; }
  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-thumb { background: #333; }
  ::placeholder { color: var(--dim); }

  .app { display: flex; flex-direction: column; height: 100vh; height: -webkit-fill-available; }

  /* Header */
  .header { padding: 52px 20px 0; border-bottom: 1px solid var(--bg3); flex-shrink: 0; }
  .header-top { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 20px; }
  .wordmark { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 300; letter-spacing: 0.04em; }
  .wordmark-sub { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--dim); letter-spacing: 0.14em; text-transform: uppercase; margin-top: 2px; }
  .week-count { text-align: right; }
  .week-count-num { font-family: 'DM Mono', monospace; font-size: 20px; }
  .week-count-label { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--dim); letter-spacing: 0.1em; }

  /* Nav */
  .nav { display: flex; }
  .nav-btn { background: none; border: none; border-bottom: 2px solid transparent; color: var(--dim); padding: 8px 16px 10px; font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; transition: all 0.15s; }
  .nav-btn.active { border-bottom-color: var(--text); color: var(--text); }

  /* Content */
  .content { flex: 1; overflow-y: auto; padding: 24px 20px 100px; max-width: 480px; width: 100%; margin: 0 auto; }

  /* Sync bar */
  .sync-bar { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--dim); letter-spacing: 0.08em; margin-bottom: 20px; display: flex; align-items: center; gap: 6px; }
  .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--dim); flex-shrink: 0; }
  .sync-dot.synced { background: var(--green); }
  .sync-dot.syncing { background: var(--gold); animation: pulse 1s infinite; }
  .sync-dot.error { background: var(--red); }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  /* Deviation types */
  .dev-btn { display: flex; align-items: center; width: 100%; background: transparent; border: 1px solid var(--bg3); border-radius: 6px; padding: 12px 14px; margin-bottom: 8px; color: var(--text); text-align: left; transition: all 0.15s; gap: 14px; }
  .dev-btn.selected { background: var(--bg2); border-color: var(--dim); }
  .dev-icon { font-family: 'DM Mono', monospace; font-size: 16px; color: var(--dim); width: 18px; flex-shrink: 0; }
  .dev-btn.selected .dev-icon { color: var(--gold); }
  .dev-label { font-family: 'Cormorant Garamond', serif; font-size: 16px; }
  .dev-note { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--dim); margin-top: 2px; letter-spacing: 0.06em; }
  .dev-check { margin-left: auto; color: var(--gold); font-size: 12px; font-family: 'DM Mono', monospace; }

  /* Form elements */
  .textarea { width: 100%; background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; padding: 12px 14px; color: var(--text); font-family: 'Cormorant Garamond', serif; font-size: 15px; resize: none; margin-bottom: 14px; }
  .input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 8px 10px; color: var(--text); font-family: 'Cormorant Garamond', serif; font-size: 18px; }

  /* Buttons */
  .btn-primary { width: 100%; padding: 14px; background: var(--gold); color: var(--bg); border-radius: 6px; font-family: 'DM Mono', monospace; font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; transition: all 0.2s; }
  .btn-primary.saved { background: #2a4a35; color: var(--green); }
  .btn-primary.light { background: var(--text); color: var(--bg); }
  .btn-primary:disabled { background: var(--bg3); color: var(--dim); cursor: not-allowed; }

  /* Cards */
  .card { background: var(--bg2); border: 1px solid var(--bg3); border-radius: 10px; padding: 18px; margin-bottom: 20px; }
  .card-title { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 300; margin-bottom: 18px; letter-spacing: 0.04em; }
  .section-label { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--dim); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 12px; }

  /* Entry rows */
  .entry-row { display: flex; gap: 10px; align-items: flex-start; padding: 10px 0; border-bottom: 1px solid var(--bg2); }
  .entry-icon { font-family: 'DM Mono', monospace; color: var(--dim); font-size: 12px; margin-top: 1px; }
  .entry-label { font-family: 'Cormorant Garamond', serif; font-size: 14px; color: var(--muted); }
  .entry-meta { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--dim); }
  .entry-note { font-family: 'Cormorant Garamond', serif; font-size: 12px; color: var(--dim); font-style: italic; margin-top: 2px; }
  .entry-time { text-align: right; flex-shrink: 0; }
  .delete-btn { color: var(--dim); font-size: 16px; padding: 0 0 0 8px; line-height: 1; flex-shrink: 0; }

  /* Measurements grid */
  .meas-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 18px; }
  .meas-field label { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--dim); letter-spacing: 0.1em; text-transform: uppercase; display: block; margin-bottom: 6px; }
  .meas-latest { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 0; }
  .meas-val { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 300; }
  .meas-unit { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--dim); margin-left: 2px; }
  .delta { font-size: 10px; padding: 2px 6px; border-radius: 10px; margin-left: 6px; font-family: 'DM Mono', monospace; }
  .delta.down { background: #1a3a28; color: var(--green); }
  .delta.up { background: #3a1a14; color: var(--red); }
  .delta.same { background: var(--bg3); color: var(--dim); }

  /* History */
  .week-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 12px; }
  .week-label { font-family: 'Cormorant Garamond', serif; font-size: 16px; }
  .week-count-badge { font-family: 'DM Mono', monospace; font-size: 11px; }
  .tag-row { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
  .tag { background: var(--bg2); border: 1px solid var(--border); border-radius: 4px; padding: 5px 10px; display: flex; align-items: center; gap: 6px; }
  .tag-icon { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--gold); }
  .tag-count { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--muted); letter-spacing: 0.06em; }
  .tag-name { font-family: 'Cormorant Garamond', serif; font-size: 12px; color: var(--muted); }

  /* Fade in */
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
  .fade-in { animation: fadeIn 0.2s ease; }

  /* Empty state */
  .empty { text-align: center; color: var(--dim); font-family: 'Cormorant Garamond', serif; font-size: 15px; font-style: italic; margin-top: 60px; }
  .empty small { font-size: 12px; font-family: 'DM Mono', monospace; display: block; margin-top: 6px; }

  /* Config banner */
  .config-banner { background: #2a1a0a; border: 1px solid #4a3010; border-radius: 8px; padding: 14px 16px; margin-bottom: 20px; font-family: 'DM Mono', monospace; font-size: 11px; color: #c8954a; line-height: 1.6; }
  .config-banner a { color: #e8b06a; }
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="header-top">
      <div>
        <div class="wordmark">nourish</div>
        <div class="wordmark-sub">deviation · results</div>
      </div>
      <div class="week-count" id="weekCountBadge" style="display:none">
        <div class="week-count-num" id="weekCountNum">0</div>
        <div class="week-count-label">this week</div>
      </div>
    </div>
    <div class="nav">
      <button class="nav-btn active" onclick="setView('log')">Log</button>
      <button class="nav-btn" onclick="setView('results')">Results</button>
      <button class="nav-btn" onclick="setView('history')">History</button>
    </div>
  </div>

  <!-- Content -->
  <div class="content" id="content"></div>
</div>

<script>
// ─── CONFIG ───────────────────────────────────────────────
// PASTE YOUR APPS SCRIPT WEB APP URL HERE after deploying:
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzM_01L6MbDmBL6DjG2hyeGWUoVOfe3V4XFvoojHyrTVbxrDGJaTVnEN_wMEtjjbvhy/exec";
// ──────────────────────────────────────────────────────────

const DEVIATION_TYPES = [
  { id: "not_hungry",   label: "Ate when not hungry",      icon: "○", note: "includes stress, emotional, social" },
  { id: "past_full",    label: "Ate past full",             icon: "◉", note: "stopped after satisfied" },
  { id: "outside_norm", label: "Ate outside usual foods",   icon: "◇", note: "different from routine" },
  { id: "late_night",   label: "Late night eating",         icon: "◐", note: "after dinner" },
];

const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const DAYS = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

let state = {
  view: "log",
  deviations: [],
  measurements: [],
  devForm: { type: null, note: "" },
  measForm: { waist: "", hips: "", bust: "", weight: "" },
  syncStatus: "idle", // idle | syncing | synced | error
  devSaved: false,
  measSaved: false,
};

// ─── DATE HELPERS ─────────────────────────────────────────
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function weekKey(dateStr) {
  const d = new Date(dateStr + "T00:00:00");
  const start = new Date(d);
  start.setDate(d.getDate() - d.getDay());
  return `${start.getFullYear()}-${String(start.getMonth()+1).padStart(2,'0')}-${String(start.getDate()).padStart(2,'0')}`;
}
function getWeekLabel(wk) {
  const start = new Date(wk + "T00:00:00");
  const end = new Date(start);
  end.setDate(start.getDate() + 6);
  return `${MONTHS[start.getMonth()]} ${start.getDate()} – ${MONTHS[end.getMonth()]} ${end.getDate()}`;
}
function formatTime() {
  return new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
}

// ─── SYNC ─────────────────────────────────────────────────
function setSyncStatus(s) {
  state.syncStatus = s;
  render();
}

async function loadData() {
  if (!SCRIPT_URL || SCRIPT_URL === "https://script.google.com/macros/s/AKfycbzM_01L6MbDmBL6DjG2hyeGWUoVOfe3V4XFvoojHyrTVbxrDGJaTVnEN_wMEtjjbvhy/exec") return;
  setSyncStatus("syncing");
  try {
    const res = await fetch(`${SCRIPT_URL}?action=getAll`);
    const data = await res.json();
    state.deviations = data.deviations || [];
    state.measurements = data.measurements || [];
    setSyncStatus("synced");
  } catch(e) {
    setSyncStatus("error");
  }
}

async function postData(body) {
  if (!SCRIPT_URL || SCRIPT_URL === "https://script.google.com/macros/s/AKfycbzM_01L6MbDmBL6DjG2hyeGWUoVOfe3V4XFvoojHyrTVbxrDGJaTVnEN_wMEtjjbvhy/exec") return false;
  setSyncStatus("syncing");
  try {
    await fetch(SCRIPT_URL, {
      method: "POST",
      body: JSON.stringify(body),
    });
    setSyncStatus("synced");
    return true;
  } catch(e) {
    setSyncStatus("error");
    return false;
  }
}

// ─── ACTIONS ──────────────────────────────────────────────
async function logDeviation() {
  if (!state.devForm.type) return;
  const entry = {
    id: Date.now(),
    type: state.devForm.type,
    note: state.devForm.note,
    date: todayStr(),
    time: formatTime(),
    weekKey: weekKey(todayStr()),
  };
  state.deviations = [entry, ...state.deviations];
  state.devForm = { type: null, note: "" };
  state.devSaved = true;
  render();
  await postData({ action: "logDeviation", entry });
  setTimeout(() => { state.devSaved = false; render(); }, 2000);
}

async function saveMeasurement() {
  const f = state.measForm;
  if (!f.waist && !f.hips && !f.bust && !f.weight) return;
  const today = todayStr();
  const entry = { id: Date.now(), date: today, weekKey: weekKey(today), ...f };
  state.measurements = [entry, ...state.measurements.filter(m => m.date !== today)];
  state.measSaved = true;
  render();
  await postData({ action: "saveMeasurement", entry });
  setTimeout(() => { state.measSaved = false; render(); }, 2000);
}

async function deleteDeviation(id) {
  state.deviations = state.deviations.filter(d => String(d.id) !== String(id));
  render();
  await postData({ action: "deleteDeviation", id });
}

// ─── RENDER HELPERS ───────────────────────────────────────
function syncBar() {
  if (!SCRIPT_URL || SCRIPT_URL === "https://script.google.com/macros/s/AKfycbzM_01L6MbDmBL6DjG2hyeGWUoVOfe3V4XFvoojHyrTVbxrDGJaTVnEN_wMEtjjbvhy/exec") {
    return `<div class="config-banner">⚠ Paste your Apps Script URL into the HTML file to enable Google Sheets sync.</div>`;
  }
  const labels = { idle: "ready", syncing: "syncing…", synced: "synced with sheets", error: "sync error — check connection" };
  return `<div class="sync-bar"><div class="sync-dot ${state.syncStatus}"></div>${labels[state.syncStatus] || ""}</div>`;
}

function delta(field) {
  const m = state.measurements;
  if (m.length < 2 || !m[0][field] || !m[1][field]) return null;
  return parseFloat(m[0][field]) - parseFloat(m[1][field]);
}

function deltaBadge(field, unit) {
  const d = delta(field);
  if (d === null) return "";
  const cls = d < 0 ? "down" : d > 0 ? "up" : "same";
  const sign = d > 0 ? "+" : "";
  return `<span class="delta ${cls}">${sign}${d.toFixed(1)}${unit}</span>`;
}

function typeCount(devs) {
  return DEVIATION_TYPES.map(t => ({ ...t, count: devs.filter(d => d.type === t.id).length }));
}

// ─── VIEW RENDERERS ───────────────────────────────────────
function renderLog() {
  const todayDevs = state.deviations.filter(d => d.date === todayStr());
  const f = state.devForm;

  const devButtons = DEVIATION_TYPES.map(t => `
    <button class="dev-btn ${f.type === t.id ? 'selected' : ''}" onclick="toggleType('${t.id}')">
      <span class="dev-icon">${t.icon}</span>
      <div>
        <div class="dev-label">${t.label}</div>
        <div class="dev-note">${t.note}</div>
      </div>
      ${f.type === t.id ? '<span class="dev-check">✓</span>' : ''}
    </button>
  `).join('');

  const noteArea = f.type ? `
    <div class="fade-in">
      <textarea class="textarea" rows="2" placeholder="Any context? (optional)" oninput="setNote(this.value)">${f.note}</textarea>
      <button class="btn-primary ${state.devSaved ? 'saved' : ''}" onclick="logDeviation()">
        ${state.devSaved ? 'logged ✓' : 'log deviation'}
      </button>
    </div>
  ` : '';

  const todayList = todayDevs.length ? `
    <div style="margin-top:28px">
      <div class="section-label">Today</div>
      ${todayDevs.map(d => {
        const t = DEVIATION_TYPES.find(t => t.id === d.type);
        return `
          <div class="entry-row">
            <span class="entry-icon">${t?.icon}</span>
            <div style="flex:1">
              <div class="entry-label">${t?.label}</div>
              ${d.note ? `<div class="entry-note">${d.note}</div>` : ''}
            </div>
            <div class="entry-time">
              <div class="entry-meta">${d.time}</div>
            </div>
            <button class="delete-btn" onclick="deleteDeviation(${d.id})">×</button>
          </div>`;
      }).join('')}
    </div>
  ` : '';

  return `
    ${syncBar()}
    <div style="font-family:'Cormorant Garamond',serif;font-size:13px;color:var(--dim);margin-bottom:20px;font-style:italic;">
      Something deviated from your norm? Log it quickly.
    </div>
    ${devButtons}
    ${noteArea}
    ${todayList}
  `;
}

function renderResults() {
  const latest = state.measurements[0];
  const fields = [["waist","Waist","in"],["hips","Hips","in"],["bust","Bust","in"],["weight","Weight","lb"]];

  const latestCard = latest ? `
    <div class="card">
      <div class="section-label">Latest · ${latest.date}</div>
      <div class="meas-latest">
        ${fields.map(([f, label, unit]) => latest[f] ? `
          <div>
            <div class="section-label">${label}</div>
            <div>
              <span class="meas-val">${latest[f]}</span>
              <span class="meas-unit">${unit}</span>
              ${deltaBadge(f, unit)}
            </div>
          </div>` : '').join('')}
      </div>
    </div>
  ` : '';

  const mf = state.measForm;
  const logCard = `
    <div class="card">
      <div class="card-title">Log measurements</div>
      <div class="meas-grid">
        ${fields.map(([f, label, unit]) => `
          <div class="meas-field">
            <label>${label} (${unit})${f === 'weight' ? ' · monthly' : ''}</label>
            <input class="input" type="number" step="0.1" placeholder="—"
              value="${mf[f]}" oninput="setMeas('${f}', this.value)"/>
          </div>`).join('')}
      </div>
      <button class="btn-primary ${state.measSaved ? 'saved' : 'light'}" onclick="saveMeasurement()">
        ${state.measSaved ? 'saved ✓' : 'save measurements'}
      </button>
    </div>
  `;

  const historyRows = state.measurements.length > 1 ? `
    <div class="section-label">History</div>
    ${state.measurements.slice(0,8).map((m, i) => `
      <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--bg2)">
        <div style="font-family:'DM Mono',monospace;font-size:10px;color:${i===0?'var(--text)':'var(--dim)'}">${m.date}</div>
        <div style="display:flex;gap:16px">
          ${fields.map(([f, abbr]) => m[f] ? `
            <div style="text-align:right">
              <div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--dim)">${abbr[0]}</div>
              <div style="font-family:'Cormorant Garamond',serif;font-size:15px;color:${i===0?'var(--text)':'var(--muted)'}">${m[f]}</div>
            </div>` : '').join('')}
        </div>
      </div>`).join('')}
  ` : '';

  return `${syncBar()}${latestCard}${logCard}${historyRows}`;
}

function renderHistory() {
  const devByWeek = state.deviations.reduce((acc, d) => {
    if (!acc[d.weekKey]) acc[d.weekKey] = [];
    acc[d.weekKey].push(d);
    return acc;
  }, {});

  const wks = Object.keys(devByWeek).sort((a,b) => b.localeCompare(a));
  const thisWk = weekKey(todayStr());

  if (wks.length === 0) return `
    ${syncBar()}
    <div class="empty">No deviations logged yet.<small>That's a good sign.</small></div>
  `;

  return syncBar() + wks.map(wk => {
    const devs = devByWeek[wk];
    const counts = typeCount(devs).filter(c => c.count > 0);
    const color = devs.length >= 5 ? 'var(--red)' : devs.length >= 3 ? 'var(--gold)' : 'var(--green)';
    const isThis = wk === thisWk;
    return `
      <div style="margin-bottom:28px">
        <div class="week-header">
          <div class="week-label" style="color:${isThis?'var(--text)':'var(--muted)'}">${getWeekLabel(wk)}</div>
          <div class="week-count-badge" style="color:${color}">${devs.length} deviation${devs.length!==1?'s':''}</div>
        </div>
        <div class="tag-row">
          ${counts.map(c => `
            <div class="tag">
              <span class="tag-icon">${c.icon}</span>
              <span class="tag-count">${c.count}×</span>
              <span class="tag-name">${c.label.split(' ').slice(0,3).join(' ')}</span>
            </div>`).join('')}
        </div>
        ${devs.map(d => {
          const t = DEVIATION_TYPES.find(t => t.id === d.type);
          return `
            <div class="entry-row">
              <span class="entry-icon">${t?.icon}</span>
              <div style="flex:1">
                <span class="entry-label">${t?.label}</span>
                ${d.note ? `<span class="entry-note"> — ${d.note}</span>` : ''}
              </div>
              <div class="entry-time">
                <div class="entry-meta">${d.date}</div>
                <div class="entry-meta">${d.time}</div>
              </div>
            </div>`;
        }).join('')}
      </div>`;
  }).join('');
}

// ─── MAIN RENDER ──────────────────────────────────────────
function render() {
  // Week badge
  const thisWkDevs = state.deviations.filter(d => d.weekKey === weekKey(todayStr()));
  const badge = document.getElementById('weekCountBadge');
  const num = document.getElementById('weekCountNum');
  if (badge && num) {
    badge.style.display = thisWkDevs.length ? 'block' : 'none';
    num.textContent = thisWkDevs.length;
    num.style.color = thisWkDevs.length >= 5 ? 'var(--red)' : thisWkDevs.length >= 3 ? 'var(--gold)' : 'var(--green)';
  }

  // Nav
  document.querySelectorAll('.nav-btn').forEach((b, i) => {
    b.classList.toggle('active', ['log','results','history'][i] === state.view);
  });

  // Content
  const content = document.getElementById('content');
  if (content) {
    content.innerHTML =
      state.view === 'log' ? renderLog() :
      state.view === 'results' ? renderResults() :
      renderHistory();
  }
}

// ─── EVENT HANDLERS ───────────────────────────────────────
function setView(v) { state.view = v; render(); }
function toggleType(id) { state.devForm.type = state.devForm.type === id ? null : id; render(); }
function setNote(v) { state.devForm.note = v; }
function setMeas(f, v) { state.measForm[f] = v; }

// ─── INIT ─────────────────────────────────────────────────
render();
loadData();
</script>
</body>
</html>
